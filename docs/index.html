<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d6efd">
  <title>W3 HB Team - Progressive Web App</title>
  <link rel="manifest" href="manifest.json">
  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00e5ff">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #333;
      min-height: 100vh;
      padding: 20px;
      line-height: 1.6;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
    }
    header {
      text-align: center;
      color: white;
      padding: 30px 20px;
      margin-bottom: 30px;
    }
    header h1 {
      font-size: 2rem;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }
    header p {
      font-size: 1rem;
      opacity: 0.95;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 16px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .card h2 {
      color: #0d6efd;
      margin-bottom: 12px;
      font-size: 1.5rem;
    }
    .card p {
      color: #555;
      line-height: 1.8;
    }
    .btn {
      display: block;
      background: #0d6efd;
      color: white;
      text-decoration: none;
      padding: 14px 24px;
      border-radius: 8px;
      margin-bottom: 12px;
      text-align: center;
      font-weight: 500;
      transition: all 0.3s ease;
      box-shadow: 0 2px 4px rgba(13,110,253,0.3);
    }
    .btn:hover {
      background: #0b5ed7;
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(13,110,253,0.4);
    }
    .btn:active {
      transform: translateY(0);
    }
    @media (max-width: 480px) {
      header h1 {
        font-size: 1.5rem;
      }
      .card {
        padding: 18px;
      }
      .btn {
        padding: 12px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🌐 W3 HB Team</h1>
      <p>Hybrid Intelligent Origin System</p>
    </header>
    
    <main>
      <section class="card">
        <h2>เกี่ยวกับ</h2>
        <p>นี่คือหน้าเว็บแบบ PWA ที่สร้างจาก repo นี้ คุณสามารถติดตั้งลงบนหน้าจอหลักของโทรศัพท์ได้</p>
      </section>
      
      <a class="btn" href="https://github.com/BBXDOO/W3_HB_team_BXCGICOG" target="_blank" rel="noopener">ดู Repository</a>
      <a class="btn" href="https://github.com/BBXDOO/W3_HB_team_BXCGICOG/issues" target="_blank" rel="noopener">Issues</a>
      <a class="btn" href="#" id="contactBtn">ติดต่อ</a>
      
      <section class="card" style="text-align:center;margin-top:18px;font-size:13px;color:#555">
        <p>หากออฟไลน์ จะมีหน้า fallback แสดง</p>
      </section>
    </main>
  </div>
  
  <script>
    if('serviceWorker' in navigator){
      window.addEventListener('load',()=>{
        navigator.serviceWorker.register('/W3_HB_team_BXCGICOG/sw.js').catch((error)=>{
          console.error('Service worker registration failed:', error);
        });
      });
    }
    document.getElementById('contactBtn').addEventListener('click',(e)=>{
      e.preventDefault();
      location.href='mailto:';
    });
  </script>
</body>
</html>
